name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch: {}
  repository_dispatch:
    types:
      - deploy

permissions:
  contents: read

concurrency:
  group: vercel-deploy-main
  cancel-in-progress: true

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run blog quality check
        run: python scripts/blog_quality_check.py

      - name: Run smoke test
        run: python scripts/smoke_test.py

  deploy:
    needs: smoke-test
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      PRODUCTION_BASE_URL: https://www.soulib.kr
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Deploy to Vercel
        id: deploy
        run: |
          deployment_url="$(vercel deploy --prod --yes --token "$VERCEL_TOKEN" | tail -n 1)"
          test -n "$deployment_url"
          echo "$deployment_url"
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Inspect deployment
        run: vercel inspect "${{ steps.deploy.outputs.deployment_url }}" --token "$VERCEL_TOKEN"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run live smoke test
        run: python scripts/live_smoke.py "$PRODUCTION_BASE_URL"
