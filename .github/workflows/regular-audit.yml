name: Regular Service Audit

on:
  schedule:
    # 09:20 KST every day.
    - cron: "20 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: regular-service-audit
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run regular audit
        env:
          AUDIT_BASE_URL: https://www.soulib.kr
          AUDIT_SYNC_ISSUE: "1"
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_ISSUE_REPO: pkkong/library_crawler
          LIVE_SEARCH_TOTAL_TIMEOUT: "8"
          LIVE_SEARCH_LIBRARY_TIMEOUT: "3"
          SHARED_SHELVES_STORAGE: json
        run: python scripts/regular_audit.py
