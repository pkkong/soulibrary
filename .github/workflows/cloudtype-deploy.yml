name: Deploy to Cloudtype

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudtype-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudtype deployment
        env:
          CLOUDTYPE_API_KEY: ${{ secrets.CLOUDTYPE_API_KEY }}
          CLOUDTYPE_PROJECT: ${{ vars.CLOUDTYPE_PROJECT }}
          CLOUDTYPE_APP: ${{ vars.CLOUDTYPE_APP }}
          CLOUDTYPE_STAGE: ${{ vars.CLOUDTYPE_STAGE }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${CLOUDTYPE_API_KEY:-}" ]]; then
            echo "::notice::Missing GitHub secret CLOUDTYPE_API_KEY. Cloudtype deploy was skipped."
            exit 0
          fi

          if [[ -n "${CLOUDTYPE_PROJECT:-}" && -n "${CLOUDTYPE_APP:-}" ]]; then
            python -c 'import json, os; print(json.dumps({"project": os.environ["CLOUDTYPE_PROJECT"], "app": os.environ["CLOUDTYPE_APP"], "stage": os.environ.get("CLOUDTYPE_STAGE") or "main"}))' > cloudtype-payload.json
            curl --fail-with-body --silent --show-error \
              -X POST "https://api.cloudtype.io/webhooks/deploy" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${CLOUDTYPE_API_KEY}" \
              --data-binary @cloudtype-payload.json
            exit 0
          fi

          if [[ "${GITHUB_EVENT_NAME}" != "push" ]]; then
            echo "::error::workflow_dispatch requires CLOUDTYPE_PROJECT and CLOUDTYPE_APP repository variables."
            exit 1
          fi

          signature_sha1="$(openssl dgst -sha1 -hmac "${CLOUDTYPE_API_KEY}" "${GITHUB_EVENT_PATH}" | awk '{print $2}')"
          signature_sha256="$(openssl dgst -sha256 -hmac "${CLOUDTYPE_API_KEY}" "${GITHUB_EVENT_PATH}" | awk '{print $2}')"

          curl --fail-with-body --silent --show-error \
            -X POST "https://api.cloudtype.io/webhooks/github" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-GitHub-Delivery: ${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            -H "X-Hub-Signature: sha1=${signature_sha1}" \
            -H "X-Hub-Signature-256: sha256=${signature_sha256}" \
            --data-binary @"${GITHUB_EVENT_PATH}"
