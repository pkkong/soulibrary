name: Deploy to Cloudtype

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudtype-deploy-main
  cancel-in-progress: true

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke test
        run: python scripts/smoke_test.py

  deploy:
    needs: smoke-test
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudtype deployment
        env:
          CLOUDTYPE_API_KEY: ${{ secrets.CLOUDTYPE_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${CLOUDTYPE_API_KEY:-}" ]]; then
            echo "::notice::Missing GitHub secret CLOUDTYPE_API_KEY. Cloudtype deploy was skipped."
            exit 0
          fi

          payload_path="${GITHUB_EVENT_PATH}"
          if [[ "${GITHUB_EVENT_NAME}" != "push" ]]; then
            payload_path="cloudtype-push-payload.json"
            python - <<'PY' > "${payload_path}"
          import json
          import os

          repo = os.environ["GITHUB_REPOSITORY"]
          owner, name = repo.split("/", 1)
          sha = os.environ["GITHUB_SHA"]
          server = os.environ.get("GITHUB_SERVER_URL", "https://github.com")
          ref = "refs/heads/main"
          html_url = f"{server}/{repo}"

          payload = {
              "ref": ref,
              "before": "0" * 40,
              "after": sha,
              "repository": {
                  "id": 1099505361,
                  "name": name,
                  "full_name": repo,
                  "private": True,
                  "html_url": html_url,
                  "url": html_url,
                  "clone_url": f"{html_url}.git",
                  "git_url": f"git://github.com/{repo}.git",
                  "ssh_url": f"git@github.com:{repo}.git",
                  "default_branch": "main",
                  "owner": {
                      "name": owner,
                      "login": owner,
                  },
              },
              "pusher": {
                  "name": owner,
                  "email": "156266793+pkkong@users.noreply.github.com",
              },
              "sender": {
                  "login": owner,
              },
              "head_commit": {
                  "id": sha,
                  "message": "Manual Cloudtype deployment",
                  "timestamp": "1970-01-01T00:00:00Z",
                  "url": f"{html_url}/commit/{sha}",
              },
              "commits": [],
          }
          print(json.dumps(payload, separators=(",", ":")))
          PY
          fi

          signature_sha1="$(openssl dgst -sha1 -hmac "${CLOUDTYPE_API_KEY}" "${payload_path}" | awk '{print $2}')"
          signature_sha256="$(openssl dgst -sha256 -hmac "${CLOUDTYPE_API_KEY}" "${payload_path}" | awk '{print $2}')"

          curl --fail-with-body --silent --show-error \
            -X POST "https://api.cloudtype.io/webhooks/github" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-GitHub-Delivery: ${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            -H "X-Hub-Signature: sha1=${signature_sha1}" \
            -H "X-Hub-Signature-256: sha256=${signature_sha256}" \
            --data-binary @"${payload_path}"
