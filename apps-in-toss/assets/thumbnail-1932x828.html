<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1932, initial-scale=1" />
    <title>서울 전자책 찾기 썸네일</title>
    <style>
      :root {
        color: #1d1d1f;
        background: #ffffff;
        font-family:
          Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 1932px;
        height: 828px;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 18%, rgba(242, 242, 247, 0.95), rgba(255, 255, 255, 0) 34%),
          linear-gradient(90deg, #ffffff 0%, #fbfbfd 100%);
      }

      .canvas {
        display: grid;
        grid-template-columns: 720px 1fr;
        gap: 92px;
        width: 100%;
        height: 100%;
        padding: 92px 118px;
      }

      .brand {
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-width: 0;
      }

      .logo-row {
        display: flex;
        align-items: center;
        gap: 28px;
        margin-bottom: 46px;
      }

      .logo {
        width: 128px;
        height: 128px;
        border-radius: 0;
      }

      .label {
        color: #6e6e73;
        font-size: 30px;
        font-weight: 800;
        line-height: 1.2;
      }

      h1 {
        margin: 0;
        color: #1d1d1f;
        font-size: 82px;
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1.08;
      }

      .subtitle {
        width: 620px;
        margin: 32px 0 0;
        color: #515154;
        font-size: 34px;
        font-weight: 700;
        letter-spacing: 0;
        line-height: 1.42;
      }

      .keyword-row {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        width: 620px;
        margin-top: 42px;
      }

      .keyword {
        min-height: 52px;
        padding: 0 22px;
        border-radius: 999px;
        background: #f2f2f7;
        color: #515154;
        font-size: 24px;
        font-weight: 850;
        line-height: 52px;
      }

      .screen {
        align-self: center;
        width: 762px;
        padding: 28px;
        border: 1px solid #f2f2f7;
        border-radius: 36px;
        background: #ffffff;
        box-shadow: 0 24px 60px rgba(29, 29, 31, 0.1);
        overflow: hidden;
      }

      .search-row {
        display: grid;
        grid-template-columns: 1fr 74px;
        gap: 16px;
        align-items: center;
      }

      .searchbar,
      .filter {
        height: 74px;
        border-radius: 24px;
        background: #f2f2f7;
      }

      .searchbar {
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr) 62px;
        align-items: center;
        gap: 8px;
        padding: 0 8px 0 24px;
        color: #8e8e93;
      }

      .magnify {
        width: 25px;
        height: 25px;
        border: 3px solid currentColor;
        border-radius: 999px;
        position: relative;
      }

      .magnify::after {
        content: "";
        position: absolute;
        right: -10px;
        bottom: -8px;
        width: 13px;
        height: 3px;
        border-radius: 999px;
        background: currentColor;
        transform: rotate(45deg);
      }

      .query {
        color: #1d1d1f;
        font-size: 28px;
        font-weight: 800;
      }

      .submit {
        display: grid;
        place-items: center;
        width: 58px;
        height: 58px;
        border-radius: 999px;
        background: #1d1d1f;
        color: #ffffff;
      }

      .submit .magnify {
        width: 21px;
        height: 21px;
        border-width: 2.5px;
      }

      .filter {
        display: grid;
        place-items: center;
        color: #6e6e73;
      }

      .filter-lines,
      .filter-lines::before,
      .filter-lines::after {
        display: block;
        width: 28px;
        height: 3px;
        border-radius: 999px;
        background: currentColor;
      }

      .filter-lines {
        position: relative;
      }

      .filter-lines::before,
      .filter-lines::after {
        content: "";
        position: absolute;
        left: 5px;
      }

      .filter-lines::before {
        top: -10px;
        width: 18px;
      }

      .filter-lines::after {
        top: 10px;
        width: 12px;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        gap: 16px;
        margin: 18px 0 28px;
        color: #1d1d1f;
        font-size: 22px;
        font-weight: 700;
      }

      .toggle {
        width: 58px;
        height: 32px;
        border-radius: 999px;
        background: #e5e5ea;
        position: relative;
      }

      .toggle::after {
        content: "";
        position: absolute;
        top: 4px;
        left: 4px;
        width: 24px;
        height: 24px;
        border-radius: 999px;
        background: #ffffff;
      }

      .status {
        margin-bottom: 18px;
        color: #6e6e73;
        font-size: 22px;
        font-weight: 750;
      }

      .list {
        display: grid;
        gap: 16px;
      }

      .row {
        display: grid;
        grid-template-columns: 92px minmax(0, 1fr) 56px;
        gap: 20px;
        min-height: 134px;
        align-items: center;
        padding: 16px;
        border: 1px solid #f2f2f7;
        border-radius: 24px;
        background: #ffffff;
      }

      .cover {
        width: 92px;
        height: 118px;
        border-radius: 13px;
        background:
          linear-gradient(145deg, rgba(29, 29, 31, 0.92), rgba(11, 142, 101, 0.78)),
          #1d1d1f;
      }

      .cover.green {
        background:
          linear-gradient(145deg, rgba(11, 142, 101, 0.9), rgba(29, 29, 31, 0.76)),
          #0b8e65;
      }

      .meta {
        min-width: 0;
      }

      .title {
        overflow: hidden;
        color: #1d1d1f;
        font-size: 25px;
        font-weight: 900;
        line-height: 1.24;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .author {
        overflow: hidden;
        margin-top: 9px;
        color: #515154;
        font-size: 20px;
        font-weight: 700;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .chips {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      .count,
      .chip {
        min-height: 30px;
        border-radius: 999px;
        font-size: 16px;
        font-weight: 900;
        line-height: 30px;
      }

      .count {
        color: #0b8e65;
      }

      .chip {
        padding: 0 10px;
        color: #515154;
        background: #f2f2f7;
      }

      .shelf {
        display: grid;
        place-items: center;
        width: 50px;
        height: 50px;
        border-radius: 999px;
        background: #f2f2f7;
        color: #6e6e73;
      }

      .bookmark {
        width: 23px;
        height: 28px;
        border: 3px solid currentColor;
        border-radius: 4px 4px 6px 6px;
        border-bottom-color: transparent;
        position: relative;
      }

      .bookmark::after {
        content: "";
        position: absolute;
        left: 5px;
        bottom: -7px;
        width: 9px;
        height: 9px;
        border-left: 3px solid currentColor;
        border-bottom: 3px solid currentColor;
        transform: rotate(-45deg);
        background: #f2f2f7;
      }
    </style>
  </head>
  <body>
    <main class="canvas">
      <section class="brand">
        <div class="logo-row">
          <img class="logo" src="app-logo-600.png" alt="" />
          <div class="label">서울 공공 전자책</div>
        </div>
        <h1>웹에서 쓰던 검색 경험을<br />토스 안에서도 그대로</h1>
        <p class="subtitle">책 제목이나 저자명으로 서울 공공 전자도서관 제공처를 빠르게 확인하세요.</p>
        <div class="keyword-row" aria-hidden="true">
          <span class="keyword">검색바</span>
          <span class="keyword">필터</span>
          <span class="keyword">내 서재</span>
          <span class="keyword">오류 신고</span>
        </div>
      </section>

      <section class="screen" aria-label="앱 화면 예시">
        <div class="search-row">
          <div class="searchbar">
            <div class="magnify"></div>
            <div class="query">달러구트</div>
            <div class="submit"><div class="magnify"></div></div>
          </div>
          <div class="filter"><span class="filter-lines"></span></div>
        </div>
        <div class="toggle-row">
          <span class="toggle"></span>
          <span>결과 내 재검색</span>
        </div>
        <div class="status">'달러구트' 검색 결과 4권</div>
        <div class="list">
          <article class="row">
            <div class="cover green"></div>
            <div class="meta">
              <div class="title">달러구트 꿈 백화점. 2</div>
              <div class="author">이미예 · 팩토리나인</div>
              <div class="chips">
                <span class="count">30곳 제공</span>
                <span class="chip">교보</span>
                <span class="chip">기타</span>
                <span class="chip">YES24</span>
              </div>
            </div>
            <div class="shelf"><span class="bookmark"></span></div>
          </article>
          <article class="row">
            <div class="cover"></div>
            <div class="meta">
              <div class="title">달러구트 꿈 백화점</div>
              <div class="author">이미예 · 북닻</div>
              <div class="chips">
                <span class="count">29곳 제공</span>
                <span class="chip">교보</span>
                <span class="chip">기타</span>
                <span class="chip">YES24</span>
              </div>
            </div>
            <div class="shelf"><span class="bookmark"></span></div>
          </article>
          <article class="row">
            <div class="cover green"></div>
            <div class="meta">
              <div class="title">내 서재에 담아 다시 확인</div>
              <div class="author">관심 있는 전자책 저장</div>
              <div class="chips">
                <span class="count">저장됨</span>
                <span class="chip">내 서재</span>
              </div>
            </div>
            <div class="shelf"><span class="bookmark"></span></div>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
