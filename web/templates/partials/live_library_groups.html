<div class="lib-groups" data-live-library-groups>
    {% if not book.library_groups %}
    <div class="lib-groups-placeholder{% if detail_hydrate_url %} is-loading{% endif %}" data-library-placeholder{% if not detail_hydrate_url %} aria-hidden="true"{% endif %}>
        {% if detail_hydrate_url %}
        <div class="lib-placeholder-head">
            <span class="detail-inline-spinner" aria-hidden="true"></span>
            <span>도서관 조회 중</span>
        </div>
        <div class="lib-placeholder-grid" aria-hidden="true">
            {% for _ in range(8) %}
            <span class="lib-placeholder-card"></span>
            {% endfor %}
        </div>
        {% endif %}
    </div>
    {% endif %}
    {% for group in book.library_groups %}
    <div class="lib-group-row{% if group.pending_status_count %} is-pending{% endif %}">
        <div class="lib-group-title">{{ group.label }}</div>
        <div class="lib-grid" data-lib-group>
            {% for lib in group.libraries %}
            <a class="lib-card status-unknown"
               href="{{ lib.detail_url or '#' }}"
               target="_blank"
               rel="noopener noreferrer"
               {% if lib.status_supported %}
               data-live-status="1"
               {% endif %}
               data-status-kind="{{ lib.status_kind }}"
               data-service-type="{{ lib.service_type }}"
               data-library-code="{{ lib.code }}"
               data-brcd="{{ lib.brcd }}"
               data-goods-id="{{ lib.goods_id }}"
               data-content-id="{{ lib.content_id }}"
               data-ctts="{{ lib.ctts_dvsn_code }}"
               data-ctgr="{{ lib.ctgr_id }}"
               data-sntn="{{ lib.sntn_auth_code }}"
               data-product-cd="{{ lib.product_cd }}"
               data-category-id="{{ lib.category_id }}">
                <span class="lib-badge-name">{{ lib.short or lib.name }}</span>
                <span class="lib-status{% if lib.status_supported %} is-loading{% else %} is-muted{% endif %}" data-status-text{% if lib.status_supported %} aria-label="조회 중..."{% endif %}>{{ lib.status_label }}</span>
            </a>
            {% endfor %}
        </div>
        <div class="lib-loading" aria-hidden="true"><span class="lib-spinner"></span></div>
    </div>
    {% endfor %}
</div>
