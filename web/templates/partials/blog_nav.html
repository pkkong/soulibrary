<nav class="blog-local-nav" aria-label="블로그 상단 메뉴">
    <div class="app-page-head blog-local-head">
        <a class="app-page-title blog-local-brand" href="/blog">블로그</a>
        <div class="app-head-actions blog-local-actions">
            <details class="blog-nav-disclosure blog-search-panel"{% if blog_query %} open{% endif %}>
                <summary class="app-icon-button blog-icon-button{% if blog_query %} is-active{% endif %}" aria-label="블로그 검색" title="검색">
                    <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="11" cy="11" r="7"></circle>
                        <path d="m20 20-3.5-3.5"></path>
                    </svg>
                </summary>
                <form class="blog-local-search" action="/blog" method="get" role="search">
                    <input type="search" name="blog_q" value="{{ blog_query|default('', true) }}" placeholder="블로그 검색" aria-label="블로그 검색">
                    <button type="submit">검색</button>
                </form>
            </details>
            <details class="blog-nav-disclosure blog-menu-panel">
                <summary class="app-icon-button blog-icon-button{% if active_blog_category %} is-active{% endif %}" aria-label="주제 메뉴" title="메뉴">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
                        <path d="M4 7h16"></path>
                        <path d="M4 12h16"></path>
                        <path d="M4 17h16"></path>
                    </svg>
                </summary>
                <div class="blog-menu-dropdown" aria-label="블로그 카테고리">
                    <a class="{% if not active_blog_category %}is-active{% endif %}" href="/blog">전체 글</a>
                    {% for category in categories %}
                    <a class="{% if active_blog_category == category.slug %}is-active{% endif %}" href="/blog?category={{ category.slug }}">
                        <span>{{ category.title }}</span>
                        <small>{% if category.count %}{{ category.count }}편{% else %}준비 중{% endif %}</small>
                    </a>
                    {% endfor %}
                </div>
            </details>
        </div>
    </div>
</nav>
<script>
(function () {
    var nav = document.currentScript.previousElementSibling;
    if (!nav || nav.dataset.bound === "true") return;
    nav.dataset.bound = "true";
    var panels = Array.prototype.slice.call(nav.querySelectorAll(".blog-nav-disclosure"));

    panels.forEach(function (panel) {
        var summary = panel.querySelector("summary");
        if (summary) {
            summary.addEventListener("click", function () {
                if (panel.open) return;
                panels.forEach(function (other) {
                    if (other !== panel) other.open = false;
                });
            });
        }
        panel.addEventListener("toggle", function () {
            if (!panel.open) return;
            panels.forEach(function (other) {
                if (other !== panel) other.open = false;
            });
            if (panel.classList.contains("blog-search-panel")) {
                var input = panel.querySelector('input[type="search"]');
                if (input) window.setTimeout(function () { input.focus(); }, 0);
            }
        });
    });

    document.addEventListener("click", function (event) {
        if (nav.contains(event.target)) return;
        panels.forEach(function (panel) { panel.open = false; });
    });

    document.addEventListener("keydown", function (event) {
        if (event.key !== "Escape") return;
        panels.forEach(function (panel) { panel.open = false; });
    });
})();
</script>
