{% extends "base.html" %}

{% block title %}내 서재 - 서울시 전자도서 통합검색{% endblock %}
{% block body_class %}page-my-shelf{% endblock %}

{% block content %}
<div class="shelf-shell">
    <section class="shelf-head" aria-labelledby="shelf-title">
        <h1 id="shelf-title">내 서재</h1>
        <div class="shelf-head-actions">
            <button class="shelf-icon-button" id="shelf-create-toggle" type="button" aria-label="새 서재 만들기" aria-expanded="false">
                <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
                    <path d="M12 5v14"></path>
                    <path d="M5 12h14"></path>
                </svg>
            </button>
            <button class="shelf-icon-button" id="shelf-manage-toggle" type="button" aria-label="서재 관리" aria-expanded="false">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" aria-hidden="true">
                    <path d="M5 12h.01"></path>
                    <path d="M12 12h.01"></path>
                    <path d="M19 12h.01"></path>
                </svg>
            </button>
        </div>
    </section>

    <section class="shelf-panel shelf-manager" aria-labelledby="shelf-manager-title">
        <div class="shelf-manager-row">
            <h2 id="shelf-manager-title" class="sr-only">서재</h2>
            <div id="shelf-list-tabs" class="shelf-list-tabs" role="tablist" aria-label="서재 목록"></div>
            <span id="shelf-list-count" class="shelf-muted shelf-list-count">1개</span>
        </div>
        <div class="shelf-manage-actions" id="shelf-manage-actions" hidden>
            <button class="shelf-action-button" id="shelf-share" type="button" aria-label="공유" title="공유">
                <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="18" cy="5" r="3"></circle>
                    <circle cx="6" cy="12" r="3"></circle>
                    <circle cx="18" cy="19" r="3"></circle>
                    <path d="M8.6 10.7l6.8-4.4"></path>
                    <path d="M8.6 13.3l6.8 4.4"></path>
                </svg>
            </button>
            <button class="shelf-action-button" id="shelf-rename" type="button" aria-label="이름 변경" title="이름 변경">
                <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M12 20h9"></path>
                    <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
                </svg>
            </button>
            <button class="shelf-action-button" id="shelf-clear" type="button" aria-label="현재 서재 비우기" title="현재 서재 비우기">
                <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M3 6h18"></path>
                    <path d="M8 6V4h8v2"></path>
                    <path d="M19 6l-1 14H6L5 6"></path>
                </svg>
            </button>
            <button class="shelf-action-button danger" id="shelf-delete-list" type="button" aria-label="서재 삭제" title="서재 삭제">
                <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M3 6h18"></path>
                    <path d="M8 6V4h8v2"></path>
                    <path d="M19 6l-1 14H6L5 6"></path>
                </svg>
            </button>
        </div>
        <form class="shelf-create-form" id="shelf-create-form" hidden>
            <label class="sr-only" for="shelf-create-name">새 서재 이름</label>
            <input id="shelf-create-name" type="text" maxlength="80" placeholder="새 서재 이름" enterkeyhint="done">
            <button type="submit" aria-label="새 서재 추가">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" aria-hidden="true">
                    <path d="M12 5v14"></path>
                    <path d="M5 12h14"></path>
                </svg>
            </button>
        </form>
    </section>

    <section class="shelf-panel" aria-labelledby="shelf-list-title">
        <div class="shelf-section-head">
            <div>
                <h2 id="shelf-list-title">담은 책</h2>
                <p id="shelf-list-desc" class="shelf-active-desc"></p>
            </div>
            <span id="shelf-count" class="shelf-muted">0권</span>
        </div>
        <div class="shelf-share-panel" id="shelf-share-panel" hidden>
            <label class="sr-only" for="shelf-share-url">공유 링크</label>
            <input id="shelf-share-url" type="url" readonly>
            <button class="shelf-mini-button" id="shelf-copy-share" type="button" aria-label="공유 링크 복사">
                <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="9" y="9" width="11" height="11" rx="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
            </button>
            <div class="shelf-share-status" id="shelf-share-status" aria-live="polite"></div>
        </div>
        <div id="shelf-empty" class="shelf-empty">
            <div class="shelf-empty-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 4h12a1 1 0 0 1 1 1v15l-7-4-7 4V5a1 1 0 0 1 1-1Z"></path>
                </svg>
            </div>
            <div class="shelf-empty-title">아직 담은 책이 없습니다.</div>
            <a class="shelf-empty-link" href="/search">검색하기</a>
        </div>
        <div id="shelf-items" class="shelf-items"></div>
    </section>
</div>
<script src="{{ url_for('static', filename='js/shelf_storage.js', v='20260519i') }}"></script>
<script src="{{ url_for('static', filename='js/my_shelf.js', v='20260519i') }}"></script>
{% endblock %}
