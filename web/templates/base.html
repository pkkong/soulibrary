<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% block title %}서울시 전자도서 통합검색{% endblock %}</title>
    <meta name="description" content="전자책 검색, 전자도서관 검색. 서울시 전자도서 통합검색에서 교보/YES24 등 공급사와 도서관 보유 현황을 한 번에 확인하세요.">
    <meta name="keywords" content="전자책 검색, 전자도서관 검색, 서울 전자도서관, 전자책 통합검색, 교보 전자도서관, YES24 전자도서관">
    <meta property="og:title" content="서울시 전자도서 통합검색 | 도서관 보유 현황 한눈에">
    <meta property="og:description" content="전자책 검색, 전자도서관 검색. 서울시 전자도서 통합검색에서 교보/YES24 등 공급사와 도서관 보유 현황을 한 번에 확인하세요.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.soulib.kr/">
    <meta property="og:site_name" content="서울시 전자도서 통합검색">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.8/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/search.css') }}">
    <meta name="google-site-verification" content="ufWk5RmswC8ZKqrvZg49uBbt6tEZDffAyp-0AG16l9k" />
    <meta name="naver-site-verification" content="f4cb296e8b2fe391bf2b6df997e7445491043c7f" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WS1N5XY56P"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-WS1N5XY56P');
    </script>
    {% block head %}{% endblock %}
</head>
<body class="{% if show_topbar %}has-topbar{% endif %} {% block body_class %}{% endblock %}">
    {% if show_topbar %}
    <header class="topbar" role="banner">
        <div class="topbar-inner container-compact">
            <div class="topbar-line">
                <a class="topbar-title" href="/">서울시 전자도서 통합검색 (beta)</a>
                {% if topbar_desc %}
                <span class="topbar-desc">{{ topbar_desc }}</span>
                {% endif %}
            </div>
        </div>
    </header>
    {% endif %}

    <main class="app-main" role="main">
        {% block content %}{% endblock %}
    </main>

    <nav class="bottom-nav" aria-label="메뉴">
        <a class="nav-item {% if active_tab == 'home' %}is-active{% endif %}" href="/">
            <span class="nav-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 11.5L12 4l9 7.5"></path>
                    <path d="M5 10.5V20h14v-9.5"></path>
                </svg>
            </span>
            <span class="nav-label">홈</span>
        </a>
        <a class="nav-item nav-item-search {% if active_tab == 'search' %}is-active{% endif %}" href="/search" id="global-search-toggle">
            <span class="nav-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="7"></circle>
                    <path d="M21 21l-4.3-4.3"></path>
                </svg>
            </span>
            <span class="nav-label">검색</span>
        </a>
        <a class="nav-item {% if active_tab == 'guide' %}is-active{% endif %}" href="/guide">
            <span class="nav-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h13a3 3 0 0 1 3 3v13H7a3 3 0 0 1-3-3V4z"></path>
                    <path d="M7 4v16"></path>
                </svg>
            </span>
            <span class="nav-label">가이드</span>
        </a>
        <a class="nav-item" href="https://blog.naver.com/copypasteattach/224148319783" target="_blank" rel="noopener noreferrer">
            <span class="nav-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 5h16"></path>
                    <path d="M4 12h16"></path>
                    <path d="M4 19h10"></path>
                </svg>
            </span>
            <span class="nav-label">블로그</span>
        </a>
    </nav>

    <div class="global-search-sheet" id="global-search-sheet" aria-hidden="true">
        <div class="global-search-header">
            <form class="global-search-bar" id="global-search-form">
                <span class="global-search-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="7"></circle>
                        <path d="M21 21l-4.3-4.3"></path>
                    </svg>
                </span>
                <label class="sr-only" for="global-query">검색어</label>
                <input type="text" id="global-query" placeholder="검색어를 입력하세요" autocomplete="off" />
            </form>
            <button type="button" class="global-search-close" id="global-search-close">닫기</button>
        </div>
        <div class="global-search-body">
            <div class="global-search-empty">
                최근 검색어가 없습니다<br />도서를 검색해보세요
            </div>
        </div>
    </div>

    <script>
        (function () {
            const toggle = document.getElementById("global-search-toggle");
            const sheet = document.getElementById("global-search-sheet");
            const form = document.getElementById("global-search-form");
            const input = document.getElementById("global-query");
            const closeBtn = document.getElementById("global-search-close");

            if (!toggle || !sheet || !form || !input || !closeBtn) return;

            function focusSearchInput() {
                if (document.activeElement === input) return;
                input.focus({ preventScroll: true });
                input.select();
            }

            function openSheet(immediateFocus = false) {
                sheet.classList.add("show");
                sheet.setAttribute("aria-hidden", "false");
                document.body.classList.add("sheet-open");
                if (immediateFocus) {
                    focusSearchInput();
                    return;
                }
                requestAnimationFrame(() => {
                    focusSearchInput();
                    setTimeout(focusSearchInput, 60);
                });
            }

            function closeSheet() {
                sheet.classList.remove("show");
                sheet.setAttribute("aria-hidden", "true");
                document.body.classList.remove("sheet-open");
            }

            window.__openGlobalSearch = openSheet;
            window.__closeGlobalSearch = closeSheet;

            toggle.addEventListener("click", (e) => {
                e.preventDefault();
                if (sheet.classList.contains("show")) return;
                openSheet(true);
            });

            toggle.addEventListener("touchend", (e) => {
                e.preventDefault();
                if (sheet.classList.contains("show")) return;
                openSheet(true);
            }, { passive: false });

            sheet.addEventListener("click", (e) => {
                if (e.target === input) return;
                focusSearchInput();
            });

            sheet.addEventListener("touchend", () => {
                focusSearchInput();
            }, { passive: true });

            closeBtn.addEventListener("click", closeSheet);
            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape") closeSheet();
            });

            form.addEventListener("submit", (e) => {
                e.preventDefault();
                const q = (input.value || "").trim();
                if (!q) return;
                closeSheet();
                location.href = `/search?q=${encodeURIComponent(q)}`;
            });
        })();
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
