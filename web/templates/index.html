{% extends "base.html" %}

{% block title %}서울시 전자도서 통합검색{% endblock %}
{% block body_class %}page-landing{% endblock %}

{% block content %}
<section class="landing-shell" aria-label="서비스 소개">
    <div class="landing-phone">
        <div class="landing-center">
            <div class="landing-copy">
                <h1 class="landing-title">서울 전자도서관 통합검색</h1>
                <p class="landing-sub">
                    서울의 전자도서관을 한 번에 검색합니다.<br>
                    책이 있는 곳과 대출 가능 여부를 함께 확인하세요.
                </p>
            </div>

            <form class="landing-search" action="/search" method="get">
                <label class="sr-only" for="landing-query">검색어</label>
                <span class="landing-search-brand" aria-hidden="true">
                    <img src="{{ url_for('static', filename='img/icon.png') }}" alt="">
                </span>
                <input id="landing-query" name="q" type="search" autocomplete="off" enterkeyhint="search" placeholder="책 제목, 저자 검색">
                <button type="submit" aria-label="검색">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="11" cy="11" r="7"></circle>
                        <path d="M21 21l-4.3-4.3"></path>
                    </svg>
                </button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
