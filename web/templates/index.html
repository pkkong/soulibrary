{% extends "base.html" %}

{% block title %}서울시 전자도서 통합검색{% endblock %}

{% block body_class %}page-home{% endblock %}

{% block content %}
<section class="home-search-section" aria-label="홈 검색">
    <div class="container-compact">
        <div class="home-search">
            <button class="home-search-bar" type="button" onclick="if (window.__openGlobalSearch) window.__openGlobalSearch();">
                <span class="home-search-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="7"></circle>
                        <path d="M21 21l-4.3-4.3"></path>
                    </svg>
                </span>
                <span class="home-search-placeholder">검색어를 입력하세요</span>
            </button>
        </div>
    </div>
</section>

{% for curation in home_curations %}
<section class="curation-section" data-curation="{{ curation.slug }}" aria-label="홈 큐레이션">
    <div class="curation-inner">
        <div class="curation-head">
            <div class="curation-title">{{ curation.title }}</div>
            <a class="curation-more" href="/curation/{{ curation.slug }}">더보기 &gt;</a>
        </div>
        <div class="curation-track curation-track-{{ curation.home_style }}" id="{{ curation.section_id }}"></div>
    </div>
</section>
{% endfor %}
{% endblock %}

{% block scripts %}
<script>
    window.__HOME_CURATIONS__ = {{ home_curations | tojson }};
</script>
<script src="{{ url_for('static', filename='js/home.js') }}"></script>
{% endblock %}
