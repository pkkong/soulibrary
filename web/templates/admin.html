<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>크롤러 대시보드 v2 (로컬)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.8/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
    <div class="container">
        <h1>크롤러 대시보드 v2 (로컬)</h1>
        <div class="muted">로컬에서 바로 상태를 확인하고 실행할 수 있는 새 버전입니다. 기존 /admin은 이 화면으로 대체됩니다.</div>

        <div class="toolbar">
            <button class="btn-primary" id="btnCheckTotals">원격 권수 새로고침</button>
            <button class="btn-secondary" id="btnRefresh">상태 새로고침</button>
            <div class="muted" id="lastCheckInfo"></div>
        </div>

        <div class="grid" id="summaryGrid">
            <div class="card">
                <div class="card-title">도서관 수</div>
                <div class="card-value" id="summaryLibs">{{ library_count }}</div>
                <div class="small">전체 등록된 대상</div>
            </div>
            <div class="card">
                <div class="card-title">총 도서 권수</div>
                <div class="card-value" id="summaryBooks">{{ "{:,}".format(book_count or 0) }}</div>
                <div class="small">SQLite 기준 로컬 합계</div>
            </div>
            <div class="card">
                <div class="card-title">진행 중</div>
                <div class="card-value" id="summaryRunning">0</div>
                <div class="small">현재 실행 중인 작업</div>
            </div>
            <div class="card">
                <div class="card-title">실패 / 경고</div>
                <div class="card-value" id="summaryFailed">0</div>
                <div class="small">최근 상태가 실패 또는 차이 존재</div>
            </div>
        </div>

        <div class="sticky-actions">
            <strong>도서관별 상태</strong>
        </div>

        <table>
            <thead>
                <tr>
                    <th>도서관</th>
                    <th>플랫폼</th>
                    <th>방식</th>
                    <th class="nowrap">로컬 권수</th>
                    <th class="nowrap">원격 권수</th>
                    <th>차이</th>
                    <th>상태</th>
                    <th>메시지</th>
                    <th class="nowrap">최근 실행</th>
                    <th class="nowrap">원격 확인</th>
                    <th>액션</th>
                </tr>
            </thead>
            <tbody id="rowsBody"></tbody>
        </table>
    </div>

    <script>
        const rowsData = {{ rows|tojson|safe }};

        function statusClass(statusText) {
            if (!statusText) return "status-idle";
            const s = statusText.toLowerCase();
            if (s.includes("run")) return "status-running";
            if (s.includes("fail") || s.includes("오류")) return "status-failed";
            if (s.includes("idle") || s.includes("대기")) return "status-idle";
            if (s.includes("완료") || s.includes("done")) return "status-done";
            return "status-idle";
        }

        function formatNumber(n) {
            if (n === null || n === undefined) return "-";
            return Number(n).toLocaleString();
        }

        function formatTime(text) {
            if (!text || text === "-") return "-";
            return text;
        }

        function renderTable(statusMap) {
            const tbody = document.getElementById("rowsBody");
            tbody.innerHTML = "";
            let running = 0;
            let failed = 0;
            let diffWarn = 0;

            for (const row of rowsData) {
                const info = statusMap[row.code] || {};
                const statusText = info.status || "-";
                const cls = statusClass(statusText);
                if (cls === "status-running") running++;
                if (cls === "status-failed") failed++;

                const local = row.count || 0;
                const remote = (row.remote_count === null || row.remote_count === undefined) ? null : row.remote_count;
                let diffHtml = '<span class="diff-neutral">-</span>';
                if (remote !== null) {
                    const diff = remote - local;
                    const diffClass = diff === 0 ? "diff-good" : (diff > 0 ? "diff-bad" : "diff-neutral");
                    if (diff !== 0) diffWarn++;
                    diffHtml = `<span class="${diffClass}">${diff.toLocaleString()}</span>`;
                }

                const btnDisabled = cls === "status-running" ? "disabled" : "";
                const btnLabel = cls === "status-running" ? "실행 중" : "지금 실행";

                const homepage = row.homepage || "#";

                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>
                        <div><a href="${homepage}" target="_blank" rel="noopener noreferrer"><strong>${row.name}</strong></a></div>
                        ${row.short ? `<div class="small">${row.short}</div>` : ""}
                    </td>
                    <td>${row.platform_label}</td>
                    <td>${row.crawl_type === "scrapy" ? "scrapy" : "API"}</td>
                    <td>${formatNumber(local)}</td>
                    <td>${remote === null ? "-" : formatNumber(remote)}</td>
                    <td>${diffHtml}</td>
                    <td><span class="status-chip ${cls}">${statusText}</span></td>
                    <td class="msg">${info.msg || "-"}</td>
                    <td class="nowrap">${formatTime(info.last_run || "-")}</td>
                    <td class="nowrap">${row.remote_checked_at ? formatTime(row.remote_checked_at) : "-"}</td>
                    <td>
                        <button class="btn-primary" ${btnDisabled} onclick="runCrawler('${row.code}', '${row.name}')">${btnLabel}</button>
                    </td>
                `;
                tbody.appendChild(tr);
            }

            document.getElementById("summaryRunning").textContent = running;
            document.getElementById("summaryFailed").textContent = failed + diffWarn;
        }

        function refreshStatus() {
            fetch("/admin/status")
                .then(res => res.json())
                .then(data => {
                    renderTable(data);
                })
                .catch(() => {});
        }

        function runCrawler(code, name) {
            if (!confirm(`${name} 크롤을 실행할까요?`)) return;
            fetch(`/admin/run/${code}`, { method: "POST" })
                .then(res => res.json())
                .then(data => {
                    alert(data.msg || "요청됨");
                    refreshStatus();
                })
                .catch(err => alert("실행 오류: " + err));
        }

        function checkTotals() {
            const btn = document.getElementById("btnCheckTotals");
            btn.disabled = true;
            btn.textContent = "원격 확인 중...";
            fetch("/admin/check-totals", { method: "POST" })
                .then(res => res.json())
                .then(payload => {
                    const data = payload.data || {};
                    const nowText = (Object.values(data)[0] || {}).checked_at || "";
                    document.getElementById("lastCheckInfo").textContent = nowText ? `원격 확인: ${nowText}` : "";
                    for (const row of rowsData) {
                        const item = data[row.code];
                        if (item) {
                            row.remote_count = item.remote_count;
                            row.recommend_update = item.recommend_update;
                            row.remote_checked_at = item.checked_at;
                        }
                    }
                    refreshStatus();
                })
                .catch(err => alert("원격 권수 확인 실패: " + err))
                .finally(() => {
                    btn.disabled = false;
                    btn.textContent = "원격 권수 새로고침";
                });
        }

        document.getElementById("btnRefresh").addEventListener("click", refreshStatus);
        document.getElementById("btnCheckTotals").addEventListener("click", checkTotals);

        // 초기 렌더
        renderTable({});
        refreshStatus();
        setInterval(refreshStatus, 4000);
    </script>
</body>
</html>
