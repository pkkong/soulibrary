{% extends "base.html" %}

{% block title %}검색 - 서울시 전자도서 통합검색{% endblock %}

{% block body_class %}page-search{% endblock %}

{% block content %}
<div class="container-compact">
    <div class="search-page">
        <div class="search-top">
            <div class="search-top-row">
                <form class="search-top-bar" id="search-top-form">
                    <span class="search-top-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="7"></circle>
                            <path d="M21 21l-4.3-4.3"></path>
                        </svg>
                    </span>
                    <label class="sr-only" for="query">검색어</label>
                    <input type="search" id="query" class="search-top-input" placeholder="검색어를 입력하세요" autocomplete="off" enterkeyhint="search" />
                </form>
                <button type="button" class="filter-summary" id="filter-summary" onclick="openFilterSheet()" aria-label="필터">
                    <span class="filter-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 4h18"></path>
                            <path d="M7 12h10"></path>
                            <path d="M10 20h4"></path>
                        </svg>
                    </span>
                    <span class="sr-only">필터</span>
                </button>
            </div>
            <div class="refine-toggle">
                <label class="toggle">
                    <input type="checkbox" id="refine-toggle" />
                    <span class="toggle-ui" aria-hidden="true"></span>
                    <span class="toggle-label">결과 내 재검색</span>
                </label>
            </div>
        </div>

        <div class="summary-row">
            <div id="status"></div>
        </div>

        <div class="content">
            <div class="loader" id="loading-spinner"></div>
            <div class="search-empty-state" id="search-empty-state" aria-live="polite">
                <div class="search-empty-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="7"></circle>
                        <path d="M21 21l-4.3-4.3"></path>
                    </svg>
                </div>
                <p>책 제목이나 저자를 검색하세요.</p>
            </div>
            <div id="results" class="grid"></div>
            <button id="load-more" onclick="renderMore()">더 보기</button>
        </div>
    </div>
</div>

<div class="filter-sheet" id="filter-sheet">
    <div class="sheet-header">
        <div id="sheet-title">필터</div>
        <button class="btn-link" onclick="closeSheet()">닫기</button>
    </div>
    <div class="sheet-body">
        <div class="sheet-left">
            <button class="sheet-tab" type="button" data-type="field">검색 대상</button>
            <button class="sheet-tab" type="button" data-type="provider">공급사</button>
            <button class="sheet-tab" type="button" data-type="library">도서관</button>
        </div>
        <div class="sheet-right">
            <div class="sheet-label" id="sheet-label"></div>
            <div class="sheet-options" id="sheet-options"></div>
        </div>
    </div>
    <div class="sheet-actions">
        <button class="btn-secondary" onclick="closeSheet()">취소</button>
        <button class="btn-primary" onclick="applySheet()">확인</button>
    </div>
</div>
<div class="overlay" id="sheet-overlay" onclick="closeSheet()"></div>

<script>
    const LIB_URLS = {{ lib_url_map|tojson|safe }};
</script>
<script src="{{ url_for('static', filename='js/shelf_storage.js', v='20260519i') }}"></script>
<script src="{{ url_for('static', filename='js/shelf_picker.js', v='20260519i') }}"></script>
<script src="{{ url_for('static', filename='js/search.js', v='live20260519i') }}"></script>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const params = new URLSearchParams(window.location.search);
        const q = (params.get("q") || "").trim();
        if (q) return;
        const input = document.getElementById("query");
        if (input) input.focus();
    });
</script>
{% endblock %}
