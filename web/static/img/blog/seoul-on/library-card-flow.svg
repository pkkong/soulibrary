<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">서울온 도서관 시설카드 확인 흐름</title>
  <desc id="desc">서울온에서 도서관 시설카드를 확인하고 Soulib에서 보유 도서관과 전자책 공급사를 연결하는 흐름</desc>
  <rect width="1200" height="760" fill="#fbfbfd"/>
  <rect x="70" y="78" width="1060" height="604" rx="42" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="120" y="150" fill="#111827" font-family="Arial, sans-serif" font-size="34" font-weight="850">서울온에서 확인할 것은 “회원 자격”입니다</text>
  <text x="120" y="194" fill="#667085" font-family="Arial, sans-serif" font-size="18">카드가 보인 뒤에도 전자책 대출은 도서관·공급사 화면에서 한 번 더 확인합니다.</text>
  <g transform="translate(120 262)">
    <rect width="270" height="276" rx="32" fill="#f0fff6"/>
    <circle cx="52" cy="54" r="26" fill="#18b66a"/>
    <text x="44" y="64" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" font-weight="850">1</text>
    <text x="34" y="118" fill="#111827" font-family="Arial, sans-serif" font-size="24" font-weight="820">서울온</text>
    <text x="34" y="156" fill="#475467" font-family="Arial, sans-serif" font-size="17">본인 인증</text>
    <text x="34" y="184" fill="#475467" font-family="Arial, sans-serif" font-size="17">통합 시민카드</text>
    <text x="34" y="212" fill="#475467" font-family="Arial, sans-serif" font-size="17">시설카드 확인</text>
  </g>
  <path d="M416 400h28" stroke="#d0d5dd" stroke-width="10" stroke-linecap="round"/>
  <path d="M432 374l34 26-34 26" fill="none" stroke="#d0d5dd" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(465 262)">
    <rect width="270" height="276" rx="32" fill="#eef2ff"/>
    <circle cx="52" cy="54" r="26" fill="#0a84ff"/>
    <text x="44" y="64" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" font-weight="850">2</text>
    <text x="34" y="118" fill="#111827" font-family="Arial, sans-serif" font-size="24" font-weight="820">Soulib</text>
    <text x="34" y="156" fill="#475467" font-family="Arial, sans-serif" font-size="17">책 검색</text>
    <text x="34" y="184" fill="#475467" font-family="Arial, sans-serif" font-size="17">보유 도서관 비교</text>
    <text x="34" y="212" fill="#475467" font-family="Arial, sans-serif" font-size="17">공급사 확인</text>
  </g>
  <path d="M761 400h28" stroke="#d0d5dd" stroke-width="10" stroke-linecap="round"/>
  <path d="M777 374l34 26-34 26" fill="none" stroke="#d0d5dd" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(810 262)">
    <rect width="270" height="276" rx="32" fill="#fff7e8"/>
    <circle cx="52" cy="54" r="26" fill="#ff9f0a"/>
    <text x="44" y="64" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" font-weight="850">3</text>
    <text x="34" y="118" fill="#111827" font-family="Arial, sans-serif" font-size="24" font-weight="820">전자책 앱</text>
    <text x="34" y="156" fill="#475467" font-family="Arial, sans-serif" font-size="17">도서관 로그인</text>
    <text x="34" y="184" fill="#475467" font-family="Arial, sans-serif" font-size="17">대출·예약 확인</text>
    <text x="34" y="212" fill="#475467" font-family="Arial, sans-serif" font-size="17">내 서재 열람</text>
  </g>
  <g transform="translate(120 590)">
    <rect width="960" height="44" rx="22" fill="#f2f4f7"/>
    <text x="28" y="29" fill="#344054" font-family="Arial, sans-serif" font-size="15" font-weight="720">핵심: 서울온은 시작점이고, 최종 대출 가능 여부는 연결된 도서관·공급사 화면에서 확인합니다.</text>
  </g>
</svg>
