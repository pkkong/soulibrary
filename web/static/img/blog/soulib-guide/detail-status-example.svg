  <text x="132" y="392" fill="#6e6e73" font-family="Arial, sans-serif" font-size="18">YES24 전자도서관</text>
  <rect x="650" y="345" width="142" height="44" rx="22" fill="#fff4d6"/>
  <text x="704" y="374" fill="#9a6a00" font-family="Arial, sans-serif" font-size="20" font-weight="700">예약</text>
