  <text x="688" y="254" fill="#138a3d" font-family="Arial, sans-serif" font-size="20" font-weight="700">대출가능</text>
  <rect x="104" y="324" width="752" height="92" rx="22" fill="#fbfbfd" stroke="#e5e5ea"/>
