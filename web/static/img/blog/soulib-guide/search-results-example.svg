<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">Soulib search results example</title>
  <desc id="desc">A neutral Soulib search results example showing book covers, titles, authors, publishers, and shelf buttons.</desc>
  <rect width="960" height="640" fill="#f5f5f7"/>
  <rect x="64" y="52" width="832" height="536" rx="36" fill="#fff" stroke="#e5e5ea" stroke-width="2"/>
  <text x="104" y="116" fill="#1d1d1f" font-family="Arial, sans-serif" font-size="42" font-weight="700">검색 결과</text>
  <text x="104" y="154" fill="#6e6e73" font-family="Arial, sans-serif" font-size="22">표지, 저자, 출판사를 함께 확인하세요</text>
  <g transform="translate(104 204)">
    <rect width="752" height="124" rx="24" fill="#fbfbfd" stroke="#e5e5ea"/>
    <rect x="24" y="22" width="56" height="80" rx="8" fill="#dce7ff"/>
    <rect x="32" y="34" width="40" height="6" rx="3" fill="#3b82f6"/>
    <rect x="32" y="50" width="32" height="6" rx="3" fill="#93c5fd"/>
    <text x="108" y="50" fill="#1d1d1f" font-family="Arial, sans-serif" font-size="27" font-weight="700">정확한 제목의 책</text>
    <text x="108" y="82" fill="#6e6e73" font-family="Arial, sans-serif" font-size="20">저자명 · 출판사</text>
    <circle cx="700" cy="62" r="28" fill="#f2f2f7"/>
    <path d="M690 58h20M700 48v28" stroke="#6e6e73" stroke-width="5" stroke-linecap="round"/>
  </g>
  <g transform="translate(104 352)">
    <rect width="752" height="124" rx="24" fill="#fbfbfd" stroke="#e5e5ea"/>
    <rect x="24" y="22" width="56" height="80" rx="8" fill="#ffe4d5"/>
    <rect x="32" y="34" width="40" height="6" rx="3" fill="#f97316"/>
    <rect x="32" y="50" width="30" height="6" rx="3" fill="#fdba74"/>
    <text x="108" y="50" fill="#1d1d1f" font-family="Arial, sans-serif" font-size="27" font-weight="700">비슷한 제목의 다른 판본</text>
    <text x="108" y="82" fill="#6e6e73" font-family="Arial, sans-serif" font-size="20">저자와 출판사를 다시 대조</text>
    <circle cx="700" cy="62" r="28" fill="#f2f2f7"/>
    <path d="M690 58h20M700 48v28" stroke="#6e6e73" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
